<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Tasks — To-Do List App</title>
  <meta name="description" content="A minimal to-do list app with localStorage persistence, tab filtering, and smooth animations.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="wrapper">

    <header>
      <div class="header-row">
        <div class="logo">
          <span class="logo-icon">✓</span>
          <span class="logo-text">My Tasks</span>
        </div>
        <span class="task-count"><span id="pendingCount">0</span> left</span>
      </div>
    </header>

    <main>

      <div class="input-box">
        <input type="text" id="taskInput" placeholder="Add a new task..." maxlength="120" autocomplete="off">
        <button id="addBtn">+</button>
      </div>

      <div class="filters">
        <div class="filter-tabs">
          <button class="tab active" data-filter="all">All</button>
          <button class="tab" data-filter="active">Active</button>
          <button class="tab" data-filter="completed">Completed</button>
        </div>
        <button id="clearBtn">Clear done</button>
      </div>

      <ul id="taskList"></ul>

      <div class="empty" id="emptyMsg">
        <span class="empty-icon">📋</span>
        <p>No tasks here</p>
        <small>Add one above to get started</small>
      </div>

    </main>

    <footer>
      <p>Built with HTML &middot; CSS &middot; JavaScript</p>
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
